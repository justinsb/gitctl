    name: "auth/login.go"
  status:
    filename: "auth/login.go"
    fileStatus: "added"
    additions: 25
    deletions: 0
    changes: 25
    patch: |
      @@ -0,0 +1,25 @@
      +package auth
      +
      +import (
      +	"net/http"
      +)
      +
      +// LoginHandler handles OAuth2 login requests.
      +func LoginHandler(w http.ResponseWriter, r *http.Request) {
      +	if r.Method != http.MethodPost {
      +		http.Error(w, "method not allowed", http.StatusMethodNotAllowed)
      +		return
      +	}
      +
      +	token, err := validateCredentials(r)
      +	if err != nil {
      +		http.Error(w, "unauthorized", http.StatusUnauthorized)
      +		return
      +	}
      +
      +	writeTokenResponse(w, token)
      +}
